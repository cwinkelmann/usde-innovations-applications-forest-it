name: Notebook Integration Tests

on:
  push:
    paths:
      - "week1/practicals/*.ipynb"
      - "src/**"
      - "pyproject.toml"
      - "environment-*.yml"
  pull_request:
    paths:
      - "week1/practicals/*.ipynb"
      - "src/**"
  workflow_dispatch:

# Shared helper that executes notebooks and then scans the executed copies for
# ImportError / ModuleNotFoundError / SyntaxError.  Data-missing errors
# (FileNotFoundError, AssertionError, etc.) are expected in CI and ignored.
env:
  CHECK_SCRIPT: |
    import json, sys, glob, re

    FATAL = ("ModuleNotFoundError", "ImportError", "SyntaxError")
    ANSI  = re.compile(r"\x1b\[[0-9;]*m")

    failures = []
    for path in sorted(glob.glob("/tmp/nb-out/**/*.ipynb", recursive=True)):
        with open(path) as f:
            nb = json.load(f)
        for i, cell in enumerate(nb["cells"]):
            if cell["cell_type"] != "code":
                continue
            for out in cell.get("outputs", []):
                # traceback is a list of ANSI-coloured strings
                tb = ANSI.sub("", "\n".join(out.get("traceback", [])))
                text_raw = out.get("text", "")
                if isinstance(text_raw, list):
                    text_raw = "".join(text_raw)
                text = ANSI.sub("", text_raw) + tb
                hit = next((e for e in FATAL if e in text), None)
                if hit:
                    src = "".join(cell["source"])[:120].replace("\n", " ")
                    failures.append(f"{path}  cell {i}  [{hit}]\n    {src}")

    if failures:
        print("FATAL errors found in executed notebooks:\n")
        for f in failures:
            print(" •", f)
        sys.exit(1)

    print(f"Checked {len(list(glob.glob('/tmp/nb-out/**/*.ipynb', recursive=True)))} notebooks — no import/syntax errors.")

jobs:
  # ── Job 1: practical_00 needs the megadetector conda environment ──────────
  notebooks-megadetector:
    name: notebooks / fit-megadetector
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment-megadetector.yml
          activate-environment: fit-megadetector
          miniforge-version: latest

      - name: Execute notebooks
        run: |
          mkdir -p /tmp/nb-out/megadetector
          jupyter nbconvert \
            --to notebook \
            --execute \
            --allow-errors \
            --ExecutePreprocessor.timeout=120 \
            --output-dir /tmp/nb-out/megadetector \
            week1/practicals/practical_00_megadetector_legacy.ipynb

      - name: Check for import / syntax errors
        run: python3 -c "$CHECK_SCRIPT"

  # ── Job 2: all remaining practicals in the training environment ───────────
  notebooks-training:
    name: notebooks / fit-training
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment-training.yml
          activate-environment: fit-training
          miniforge-version: latest

      - name: Execute notebooks
        # practical_04 excluded — requires a live Label Studio instance
        run: |
          mkdir -p /tmp/nb-out/training
          jupyter nbconvert \
            --to notebook \
            --execute \
            --allow-errors \
            --ExecutePreprocessor.timeout=180 \
            --output-dir /tmp/nb-out/training \
            week1/practicals/practical_01_visual_wildlife_datasets.ipynb \
            week1/practicals/practical_02_megadetector_ultralytics.ipynb \
            week1/practicals/practical_05_species_classification.ipynb \
            week1/practicals/practical_06_aerial_animal_detection_domain_shift.ipynb \
            week1/practicals/practical_07_run_training.ipynb \
            week1/practicals/practical_08_segmentation.ipynb \
            week1/practicals/practical_09_wrapup.ipynb

      - name: Check for import / syntax errors
        run: python3 -c "$CHECK_SCRIPT"

  # ── Job 3: HerdNet notebook ────────────────────────────────────────────────
  notebooks-herdnet:
    name: notebooks / fit-herdnet
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment-herdnet.yml
          activate-environment: fit-herdnet
          miniforge-version: latest

      - name: Execute notebooks
        run: |
          mkdir -p /tmp/nb-out/herdnet
          jupyter nbconvert \
            --to notebook \
            --execute \
            --allow-errors \
            --ExecutePreprocessor.timeout=180 \
            --output-dir /tmp/nb-out/herdnet \
            week1/practicals/practical_06_aerial_object_detection-herdnet.ipynb

      - name: Check for import / syntax errors
        run: python3 -c "$CHECK_SCRIPT"
