# resume_from: null                     # Set to .pth path to resume training
# kwargs:
#   backbone: 'timm/dla34'             # timm model name
#   pretrained: True                    # ImageNet pretrained weights
#   down_ratio: 2                       # Default (overridden to 4 in main.yaml)
#   head_conv: 64                       # Intermediate channels in heads
# freeze: null                          # List of layer names to freeze, or null


