# =============================================================================
# HerdNet Hydra Configuration Template
# =============================================================================
# Complete, annotated configuration for training HerdNet with optimal parameters
# from the Miesner 2025 thesis (marine iguana detection on Galapagos Islands).
#
# This template inlines all 4 config levels for reference. In practice, each
# section below would be a separate YAML file in the config tree:
#   main.yaml -> model/, datasets/, losses/, training_settings/
#
# Usage:
#   1. Copy this template
#   2. Update file paths (csv_file, root_dir) for your data
#   3. Adjust num_classes and class_def for your species
#   4. Adjust evaluator.threshold (matching_radius) for your animal size
#   5. Run: python tools/train.py --config-path /your/config/dir
# =============================================================================

# ---- TOP-LEVEL CONFIG (main.yaml) ----

defaults:
  - /losses: herdnet_iguana            # -> losses/herdnet_iguana.yaml
  - /datasets: floreana_dataset        # -> datasets/floreana_dataset.yaml
  - /training_settings: evaluator      # -> training_settings/evaluator.yaml
  - /model: HerdNetTimmDLA34          # -> model/HerdNetTimmDLA34.yaml
  - _self_                             # This file's values override sub-configs

# Weights & Biases configuration
wandb_flag: True                       # Set to False to disable W&B logging
wandb_project: 'herdnet'
wandb_entity: 'your_team_or_username'
wandb_run: 'experiment_name'
wandb_tags: ["dla34", "dr4", "optimal"]
wandb_notes: |
  Training HerdNet with optimal parameters from Miesner 2025 thesis.
  Backbone: DLA-34, DR=4, head_conv=64.

seed: 42                               # Random seed for reproducibility
device_name: null                       # null = auto-select GPU; or 'cuda:0', 'cpu'

# Override sub-config values from top level:
model:
  load_from: null                       # Path to pretrained checkpoint (fine-tuning)
  kwargs:
    down_ratio: 4                       # OPTIMAL: 4 (overrides default of 2)
    head_conv: 64                       # OPTIMAL: 64

training_settings:
  lr: 1.0e-4                           # Head learning rate
  backbone_lr: 1.0e-6                  # Backbone learning rate (much lower)
  weight_decay: 3.25e-4                # OPTIMAL: 3.25e-4 (default was 1.6e-4)
  warmup_iters: 100                    # Linear warmup iterations
  epochs: 20
  batch_size: 2
  evaluator:
    threshold: 75                       # CRITICAL: matching radius in pixels
    kwargs:
      lmds_kwargs:
        kernel_size: [5, 5]            # OPTIMAL: (5,5), default was (3,3)
        adapt_ts: 0.5                  # OPTIMAL: 0.5, default was 0.3

hydra:
  run:
    dir: ./outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}


# =============================================================================
# ---- MODEL CONFIG (model/HerdNetTimmDLA34.yaml) ----
# =============================================================================
# name: 'HerdNetTimmDLA'
# from_torchvision: False
