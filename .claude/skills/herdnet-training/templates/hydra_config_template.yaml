# =============================================================================
# ---- LOSSES CONFIG (losses/herdnet_iguana.yaml) ----
# =============================================================================
# FocalLoss:
#   print_name: 'focal_loss'
#   from_torch: False                   # Custom loss from animaloc
#   output_idx: 0                       # Maps to heatmap (model output[0])
#   target_idx: 0                       # Maps to FIDT map (target[0])
#   lambda_const: 1.0                   # Loss weighting factor
#   kwargs:
#     alpha: 2                          # Focal loss alpha
#     beta: 5                           # OPTIMAL: 5 (default was 4)
#     reduction: 'mean'
#     normalize: False
#
# CrossEntropyLoss:
#   print_name: 'ce_loss'
#   from_torch: True                    # Standard PyTorch loss
#   output_idx: 1                       # Maps to class map (model output[1])
#   target_idx: 1                       # Maps to class mask (target[1])
#   lambda_const: 1.0
#   background_class_weight: 0.1        # Referenced by weight list below
#   kwargs:
#     reduction: 'mean'
#     weight:                           # MUST have num_classes entries
#       - ${losses.CrossEntropyLoss.background_class_weight}   # 0: background = 0.1
#       - 5                                                     # 1: iguana = 5.0
#       - 0.1                                                   # 2: hard_negative = 0.1


