[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "wildlife-detection"
version = "0.1.0"
description = "Aerial wildlife detection pipeline for drone imagery"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "pillow",
    "pandas",
    "omegaconf",
    "wandb",
    "torch",
    "torchvision",
    "scipy",
    "marimo",
    "label-studio",
    "albumentations",
    "megadetector",
    "sahi",
    "ultralytics",
    "accelerate>=1.1.0",
    "huggingface_hub",
    "pytest"
]

[project.optional-dependencies]
yolo = ["ultralytics"]
segmentation = ["segmentation-models-pytorch", "transformers"]
all = [
    "ultralytics",
    "segmentation-models-pytorch",
    "transformers",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'not integration and not slow'"
markers = [
    "integration: tests that download data or hit external services (deselect with '-m \"not integration\"')",
    "slow: tests that take more than a minute (deselect with '-m \"not slow\"')",
]

[tool.setuptools.packages.find]
where = ["src"]
