# Rootless-Docker-friendly compose file.
#
# The container runs as root inside, which in rootless Docker maps to the
# host user that started the daemon — so files written to /data are owned
# by you on the host, not by a remapped subuid. No `user:` override needed.
#
# Host bind-mount path: set HOST_DATA_DIR in .env (default: ./_data). The
# directory is created if missing. On macOS with the example setup, this is
# /Volumes/storage/_tmp/usde.
#
# Multi-GPU: leave `deploy.resources.reservations.devices` as-is. In rootless
# Docker + NVIDIA, the nvidia-container-toolkit must be configured with
# `no-cgroups = true` in /etc/nvidia-container-runtime/config.toml. Without a
# GPU present the reservation is simply ignored — the app falls back to MPS
# (macOS) or CPU automatically.

services:
  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    image: usde-webapp:latest
    container_name: usde-webapp
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      DATA_DIR: /data
      NUM_WORKERS: "${NUM_WORKERS:-auto}"
      BATCH_SIZE: "${BATCH_SIZE:-}"
      DEVICE: "${DEVICE:-auto}"
      MD_WEIGHTS: "${MD_WEIGHTS:-md_v1000.0.0-larch.pt}"
      SPECIESNET_MODEL: "${SPECIESNET_MODEL:-kaggle:google/speciesnet/pyTorch/v4.0.2a/1}"
      LABEL_STUDIO_URL: "${LABEL_STUDIO_URL:-http://host.docker.internal:8081}"
    extra_hosts:
      # Lets the webapp reach a Label Studio container running on the host
      # (e.g. the fit-ls compose service below) via host.docker.internal on
      # Linux, matching the macOS / Windows Docker Desktop default.
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_DATA_DIR:-./_data}:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  labelstudio:
    image: heartexlabs/label-studio:latest
    container_name: fit-ls
    restart: unless-stopped
    ports:
      - "${LS_PORT:-8081}:8080"
    environment:
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
    volumes:
      - ${HOST_DATA_DIR:-./_data}/labelstudio:/label-studio/data
